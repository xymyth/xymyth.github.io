<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Journey | Yarong</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            max-width: 850px;
            margin: auto;
            padding: 40px 50px;
            color: #333;
        }

        a {
            color: #333;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .back {
            font-size: 16px;
            margin-bottom: 55px;
        }

        #map {
            width: 100%;
            height: 520px;
            position: relative;
        }

        .small-dot {
            width: 7px;
            height: 7px;
            background: #8b2f2f;
            border-radius: 50%;
            border: 1px solid white;
        }

        #memory-card {
            display: none;
            position: absolute;
            right: 70px;
            top: 120px;
            width: 230px;
            z-index: 1000;
        }

        #memory-photos {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }

        #memory-photos img {
            width: 70px;
            height: 70px;
            object-fit: cover;
        }
        #memory-title {
            font-family: 'Times New Roman', Times, serif;
            font-size: 23px;
            font-weight: normal;
            margin: 0 0 12px 0;
        }

        #memory-note {
            font-family: 'Times New Roman', Times, serif;
            font-size: 16px;
            line-height: 1.5;
            margin: 0;
        }
    </style>
</head>

<body>

    <div class="back">
        <a href="../index.html">← Home</a>
    </div>

    <div id="map">
        <div id="memory-card">
            <div id="memory-photos"></div>
            <h2 id="memory-title"></h2>
            <p id="memory-note"></p>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
        const map = L.map("map").setView([25, 0], 2);

        L.tileLayer("https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png", {
            attribution: ""
        }).addTo(map);

        const smallIcon = L.divIcon({
            className: "small-dot",
            iconSize: [7, 7]
        });

        const places = [
            {
                name: "Hefei",
                coords: [31.8206, 117.2272],
                photos: [
                    "../photos/hefei-1.jpg",
                    "../photos/hefei-2.jpg",
                    "../photos/hefei-3.jpg"
                ],
                note: "FAMILY ❤️"
            },
            {
                name: "Beijing",
                coords: [39.9042, 116.4074],
                photos: ["../photos/beijing.jpg","../photos/beijing-2.jpg","../photos/beijing-3.jpg"],
                note: "First time leaving home. 2021-2023."
            },
            {
                name: "Rochester",
                coords: [43.1566, -77.6088],
                photos: ["../photos/rochester-1.jpg","../photos/rochester-2.jpg","../photos/rochester-3.jpg","../photos/rochester-4.jpg"],
                note: "Snow, silence, long runs, and becoming someone new."
            },
            {
            name: "Chongqing",
            coords: [29.5630, 106.5516],
            photos: [
                "../photos/cq-1.jpg"
            ],
            note: "Amazing city, hard to read the map, food poisoning. 2019/02/08."
            },
            {
            name: "Hong Kong",
            coords: [22.3193, 114.1694],
            photos: [
                "../photos/hk-1.jpg",
                "../photos/hk-2.jpeg"
            ],
            note: "Bustling and suffocating. 2018/08/04."
            }
        ];

        places.forEach(place => {
            const marker = L.marker(place.coords, { icon: smallIcon }).addTo(map);

            marker.on("mouseover", () => {
                document.getElementById("memory-photos").innerHTML = (place.photos || []).map(src => `<img src="${src}" alt="">`).join("");
                document.getElementById("memory-title").textContent = place.name;
                document.getElementById("memory-note").textContent = place.note;
                document.getElementById("memory-card").style.display = "block";
            });
            marker.on("mouseout", () => {
                document.getElementById("memory-card").style.display = "none";
            });
        });
    </script>

</body>

</html>
