<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Travel | Yarong Xiao</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            max-width: 850px;
            margin: auto;
            padding: 40px 50px;
            color: #333;
        }

        a {
            color: #333;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .back {
            font-size: 16px;
            margin-bottom: 55px;
        }

        #map {
            width: 100%;
            height: 520px;
        }
    </style>
</head>

<body>

    <div class="back">
        <a href="../index.html">← Home</a>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
        const map = L.map("map").setView([25, 0], 2);

        L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
            attribution: ""
        }).addTo(map);

        const places = [
            { name: "Hefei", coords: [31.8206, 117.2272] },
            { name: "Beijing", coords: [39.9042, 116.4074] },
            { name: "Rochester", coords: [43.1566, -77.6088] },
        ];

        places.forEach(place => {
            L.marker(place.coords)
                .addTo(map)
                .bindTooltip(place.name);
        });
    </script>

</body>

</html>
